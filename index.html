<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇小游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            letter-spacing: 4px;
        }
        .score-board {
            display: flex;
            gap: 40px;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        .score-board span {
            color: #00ff88;
            font-weight: bold;
            font-size: 1.4rem;
        }
        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.3);
            background: #1a1a2e;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .controls p { font-size: 0.95rem; color: #aaa; }
        .controls .key {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 0.85rem;
            margin: 0 2px;
        }
        .btn {
            margin-top: 12px;
            padding: 12px 36px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.5);
        }
        .mobile-controls { display: none; margin-top: 15px; }
        .d-pad {
            display: grid;
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 6px;
        }
        .d-pad button {
            width: 60px; height: 60px;
            border: 2px solid #00ff88;
            border-radius: 12px;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            font-size: 1.5rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .d-pad button:active { background: rgba(0, 255, 136, 0.4); transform: scale(0.92); }
        .d-pad .up { grid-area: up; }
        .d-pad .left { grid-area: left; }
        .d-pad .right { grid-area: right; }
        .d-pad .down { grid-area: down; }
        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .mobile-controls { display: block; }
            .controls p { display: none; }
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .overlay.show { display: flex; }
        .overlay h2 {
            font-size: 2.5rem;
            color: #ff4757;
            margin-bottom: 10px;
        }
        .overlay p { font-size: 1.3rem; margin-bottom: 20px; }
        .overlay .btn { background: linear-gradient(135deg, #ff4757, #ff6b81); color: #fff; }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <div class="score-board">
        <div>🍎 得分：<span id="score">0</span></div>
        <div>🏆 最高分：<span id="highScore">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <p><span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> 或 <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 控制方向 | <span class="key">空格</span> 暂停</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
    </div>
    <div class="mobile-controls">
        <div class="d-pad">
            <button class="up" onclick="setDir(0,-1)">↑</button>
            <button class="left" onclick="setDir(-1,0)">←</button>
            <button class="right" onclick="setDir(1,0)">→</button>
            <button class="down" onclick="setDir(0,1)">↓</button>
        </div>
    </div>
    <div class="overlay" id="gameOverOverlay">
        <h2>游戏结束！</h2>
        <p>你的得分：<span id="finalScore">0</span></p>
        <button class="btn" onclick="startGame()">再来一局</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;
        let snake, direction, nextDirection, food, score, highScore, gameLoop, paused, gameRunning;
        highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        document.getElementById('highScore').textContent = highScore;
        function init() {
            snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
            direction = {x:1,y:0}; nextDirection = {x:1,y:0};
            score = 0; paused = false; gameRunning = true;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('show');
            placeFood();
        }
        function placeFood() {
            let pos;
            do { pos = {x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
            while (snake.some(s => s.x===pos.x && s.y===pos.y));
            food = pos;
        }
        function setDir(x,y) {
            if (direction.x===-x && direction.y===-y) return;
            nextDirection = {x,y};
        }
        function update() {
            if (paused || !gameRunning) return;
            direction = {...nextDirection};
            const head = {x:snake[0].x+direction.x, y:snake[0].y+direction.y};
            if (head.x<0) head.x=COLS-1; if (head.x>=COLS) head.x=0;
            if (head.y<0) head.y=ROWS-1; if (head.y>=ROWS) head.y=0;
            if (snake.some(s=>s.x===head.x&&s.y===head.y)) { gameOver(); return; }
            snake.unshift(head);
            if (head.x===food.x&&head.y===food.y) {
                score+=10; document.getElementById('score').textContent=score; placeFood();
            } else { snake.pop(); }
        }
        function draw() {
            ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=1;
            for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*GRID,0);ctx.lineTo(i*GRID,canvas.height);ctx.stroke();}
            for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*GRID);ctx.lineTo(canvas.width,j*GRID);ctx.stroke();}
            const fx=food.x*GRID+GRID/2, fy=food.y*GRID+GRID/2;
            ctx.shadowColor='#ff4757'; ctx.shadowBlur=12; ctx.fillStyle='#ff4757';
            ctx.beginPath(); ctx.arc(fx,fy,GRID/2-2,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
            snake.forEach((seg,i)=>{
                const ratio=1-i/snake.length;
                ctx.fillStyle=`rgb(0, ${Math.round(180+ratio*75)}, ${Math.round(100+ratio*36)})`;
                const p=i===0?1:2, r=i===0?6:4;
                roundRect(ctx,seg.x*GRID+p,seg.y*GRID+p,GRID-p*2,GRID-p*2,r); ctx.fill();
                if(i===0){
                    ctx.fillStyle='#fff';
                    const cx=seg.x*GRID+GRID/2, cy=seg.y*GRID+GRID/2, eo=4;
                    let e1x,e1y,e2x,e2y;
                    if(direction.x===1){e1x=cx+3;e1y=cy-eo;e2x=cx+3;e2y=cy+eo;}
                    else if(direction.x===-1){e1x=cx-3;e1y=cy-eo;e2x=cx-3;e2y=cy+eo;}
                    else if(direction.y===-1){e1x=cx-eo;e1y=cy-3;e2x=cx+eo;e2y=cy-3;}
                    else{e1x=cx-eo;e1y=cy+3;e2x=cx+eo;e2y=cy+3;}
                    ctx.beginPath();ctx.arc(e1x,e1y,2.5,0,Math.PI*2);ctx.fill();
                    ctx.beginPath();ctx.arc(e2x,e2y,2.5,0,Math.PI*2);ctx.fill();
                }
            });
            if(paused){
                ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle='#fff';ctx.font='bold 28px sans-serif';
                ctx.textAlign='center';ctx.fillText('⏸ 已暂停',canvas.width/2,canvas.height/2);
                ctx.font='16px sans-serif';ctx.fillStyle='#aaa';
                ctx.fillText('按空格键继续',canvas.width/2,canvas.height/2+30);
            }
        }
        function roundRect(ctx,x,y,w,h,r){
            ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
            ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
            ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
        }
        function gameOver(){
            gameRunning=false;clearInterval(gameLoop);
            if(score>highScore){highScore=score;localStorage.setItem('snakeHighScore',highScore);document.getElementById('highScore').textContent=highScore;}
            document.getElementById('finalScore').textContent=score;
            document.getElementById('gameOverOverlay').classList.add('show');
        }
        function startGame(){clearInterval(gameLoop);init();gameLoop=setInterval(()=>{update();draw();},110);}
        document.addEventListener('keydown',e=>{
            switch(e.key){
                case'ArrowUp':case'w':case'W':setDir(0,-1);e.preventDefault();break;
                case'ArrowDown':case's':case'S':setDir(0,1);e.preventDefault();break;
                case'ArrowLeft':case'a':case'A':setDir(-1,0);e.preventDefault();break;
                case'ArrowRight':case'd':case'D':setDir(1,0);e.preventDefault();break;
                case' ':if(gameRunning)paused=!paused;e.preventDefault();break;
            }
        });
        init(); draw();
    </script>
</body>
</html>
